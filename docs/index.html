<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles/toast.css">
    <link rel="stylesheet" href="./styles/style.css" />
    <title>Rock Paper Scissors</title>

    <!-- Importing font from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anta&family=Bitcount+Grid+Single:wght@100..900&family=Bungee+Tint&family=Funnel+Sans:ital,wght@0,300..800;1,300..800&family=Google+Sans+Code:ital,wght@0,300..800;1,300..800&family=Imperial+Script&family=Love+Light&family=Michroma&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nabla&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&family=Oxanium:wght@200..800&family=Roboto:ital,wght@0,100..900;1,100..900&family=Rouge+Script&family=Stack+Sans+Notch:wght@200..700&family=Syne+Mono&family=Tangerine:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!-- favicon -->
     <link rel="icon" type="image/x-icon" href="./Assets/favicon.ico">

    <!-- seo stuff -->
     <title>Rock Paper Scissors | Minute Games</title>

    <meta name="description"
    content="Play a responsive Rock Paper Scissors game built using HTML, CSS and JavaScript.">

    <meta name="keywords"
    content="Rock Paper Scissors, JavaScript game, HTML CSS JS">

    <meta name="author"
    content="Dueben Presley Lewis">

    <meta name="robots"
    content="index,follow">
  </head>
  <body>

    <header class="header-container">
      <h1 id="title">Minute Games</h1>

      <button class="nav-toggle" aria-label="Open menu" aria-expanded="false" aria-controls="primary-navigation">
        <span class="hamburger"></span>
      </button>

      <nav class="nav-container" id="primary-navigation">
        <ul>
          <li><a href="#home-id" class="navigation-anchor">Home</a></li>
          <li><a href="./pages/contact.html" class="navigation-anchor">Contact Us</a></li>
          <li><a href="./pages/about.html" class="navigation-anchor">About Us</a></li>
        </ul>
      </nav>

    </header>

    <main class="main-container">
      <div class="main-heading-container appear-animation " id="home-id">
        <h1 id="game-heading" class="appear-animation">Rock Paper Scissors Game</h1>
      </div>

      <div class="player-move-prompt appear-animation ">
        <p>Choose your move:</p>
      </div>

      <div class="moves-container">
        <div class="rock-button">
          <button tabindex="0" onclick="playGame('rock')" class="action-button appear-animation ">
            Rock
          </button>
        </div>

        <div class="paper-button">
          <button
            tabindex="1"
            onclick="playGame('paper')"
            class="action-button appear-animation "
          >
            Paper
          </button>
        </div>

        <div class="scissor-button">
          <button
            tabindex="2"
            onclick="playGame('scissors')"
            class="action-button appear-animation "
          >
            Scissors
          </button>
        </div>
      </div>

      <div class="display-result-container">
        <p class="js-result-display"></p>
        <p class="moves"></p>

        <p class="js-score appear-animation "></p>
      </div>

      <div class="reset-button-container">
        <button class="reset-button appear-animation " tabindex="3" onclick="resetScore()" >
          Reset Score
        </button>
      </div>

      <div id="toast-container"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="./scripts/script.js"  type="module"></script>
  </body>
  </html>
